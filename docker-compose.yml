version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: shiftsync-neo4j
    ports:
      - "7474:7474" # HTTP port (Neo4j Browser)
      - "7687:7687" # Bolt port (Database connection)
    environment:
      - NEO4J_AUTH=neo4j/shiftsync123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
